# Keys come from SonarQube Cloud > Project > Information (bottom-left).
# The defaults below are what importing this repo from GitHub produces.
sonar.projectKey=navaneethbv_FundFlow
sonar.organization=navaneethbv

sonar.sources=app,components,lib,scripts
sonar.tests=tests
# scripts/ is operator-run tooling (restore-backup.mjs, check-rls.sql), not
# application code. It takes file paths from the operator's own command line by
# design, which the taint rules read as unvalidated path traversal.
sonar.exclusions=**/*.test.ts,supabase/migrations/**,scripts/**

# Written by `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
