name: Migration smoke-check

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/check-rls.sql"

permissions:
  contents: read

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: supabase/postgres:15.8.1.085
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - name: Prepare auth schema stubs
        # Migrations reference auth.users, auth.uid() and the `authenticated`
        # role. The supabase image ships all three, and its auth schema is
        # owned by another role — so create each only when it is genuinely
        # missing. An unconditional "create if not exists" is denied on that
        # image, since permissions are checked before existence.
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "
            do \$\$
            begin
              if to_regclass('auth.users') is null then
                create schema if not exists auth;
                create table auth.users (id uuid primary key, email text);
              end if;
              if to_regproc('auth.uid') is null then
                create function auth.uid() returns uuid
                  language sql stable as 'select null::uuid';
              end if;
              if not exists (select 1 from pg_roles where rolname = 'authenticated') then
                create role authenticated;
              end if;
            end
            \$\$;
          "
      - name: Apply every migration in filename order
        run: |
          for f in supabase/migrations/*.sql; do
            echo "== applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Assert RLS on every public table
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/check-rls.sql
